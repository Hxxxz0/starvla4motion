run_id: motion_ar
run_root_dir: results/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: your_wandb_entity
wandb_project: llavavla
is_debug: false

framework:
  name: MotionAR
  latent_dim: 64
  max_obs_frames: 150
  obs_encoder_hidden_dim: 768
  qwenvl:
    base_vlm: ./playground/Pretrained_models/Qwen2.5-VL-3B-Instruct
    attn_implementation: sdpa
    vl_hidden_dim: 2048
  action_model:
    action_model_type: DiT-B
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 64
    state_dim: null
    future_action_window_size: 14
    action_horizon: 15
    past_action_window_size: 0
    repeated_diffusion_steps: 8
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: "ada_norm"
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null

datasets:
  vla_data:
    dataset_py: motion_latent_datasets
    data_mix: motion_latent
    data_root_dir: /limx_embap/tos/user/Jensen/dataset/robot_humanml_data_v2
    per_device_batch_size: 16
    num_workers: 4
    train_split: train
    eval_split: test
    chunk_size: 15
    max_obs_frames: 150
    max_motion_length: 600
    fps: 20

trainer:
  epochs: 100
  max_train_steps: 100000
  num_warmup_steps: 5000
  save_interval: 5000
  eval_interval: 100
  learning_rate:
    base: 1.0e-05
    latent_obs_encoder: 1.0e-04
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: qwen_vl_interface
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.1
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  optimizer:
    name: AdamW
    betas: [0.9, 0.95]
    eps: 1.0e-08
    weight_decay: 1.0e-08
  save_format: pt
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
